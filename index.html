let currentFilter='all',currentSearch='',theme=localStorage.getItem('theme')||'light';

document.addEventListener('DOMContentLoaded',()=>{
    initTheme();
    checkFirstVisit();
    renderByCategory();
    updateToolCount();
    setupEventListeners();
    lucide.createIcons();
});

function initTheme(){
    document.body.setAttribute('data-theme',theme);
    const icon=document.getElementById('themeIcon');
    icon.setAttribute('data-lucide',theme==='light'?'moon':'sun');
    lucide.createIcons();
}

function toggleTheme(){
    theme=theme==='light'?'dark':'light';
    localStorage.setItem('theme',theme);
    document.body.setAttribute('data-theme',theme);
    const icon=document.getElementById('themeIcon');
    icon.setAttribute('data-lucide',theme==='light'?'moon':'sun');
    lucide.createIcons();
}

function checkFirstVisit(){
    const visited=localStorage.getItem('visited');
    if(!visited){
        document.getElementById('recentlyAdded').style.display='block';
        renderRecentlyAdded();
        localStorage.setItem('visited','true');
        setTimeout(()=>{
            document.getElementById('recentlyAdded').style.display='none';
        },180000);
    }
}

function renderByCategory(){
    const container=document.getElementById('categoriesContainer');
    const noResults=document.getElementById('noResults');
    let filteredTools=tools;
    
    if(currentFilter==='free-forever'){
        filteredTools=tools.filter(t=>t.tags.includes('Free Forever'));
    }
    if(currentSearch){
        const search=currentSearch.toLowerCase();
        filteredTools=filteredTools.filter(t=>
            t.name.toLowerCase().includes(search)||
            t.description.toLowerCase().includes(search)||
            t.category.toLowerCase().includes(search)
        );
    }
    
    if(filteredTools.length===0){
        container.innerHTML='';
        noResults.style.display='block';
        return;
    }else{
        noResults.style.display='none';
    }
    
    const grouped={};
    filteredTools.forEach(tool=>{
        if(!grouped[tool.category])grouped[tool.category]=[];
        grouped[tool.category].push(tool);
    });
    
    container.innerHTML='';
    Object.keys(grouped).sort().forEach(category=>{
        const categoryTools=grouped[category];
        const icon=iconMap[category]||'box';
        const categoryHTML=`
            <section class="category-section">
                <div class="category-header">
                    <span class="category-emoji"><i data-lucide="${icon}"></i></span>
                    <h2 class="category-title">${category}<span class="category-count"> (${categoryTools.length})</span></h2>
                </div>
                <div class="tools-grid">
                    ${categoryTools.map(tool=>createToolCard(tool)).join('')}
                </div>
            </section>
        `;
        container.insertAdjacentHTML('beforeend',categoryHTML);
    });
    
    lucide.createIcons();
}

function renderRecentlyAdded(){
    const grid=document.getElementById('recentGrid');
    const recentTools=tools.filter(t=>t.new).slice(0,8);
    if(recentTools.length===0){
        document.getElementById('recentlyAdded').style.display='none';
        return;
    }
    grid.innerHTML='';
    recentTools.forEach(tool=>{
        grid.innerHTML+=createToolCard(tool);
    });
    lucide.createIcons();
}

function createToolCard(tool){
    const icon=iconMap[tool.category]||'box';
    const badges=tool.tags.map(tag=>{
        let badgeClass='badge-free';
        if(tag.includes('Forever'))badgeClass='badge-free';
        else if(tag.includes('Tier'))badgeClass='badge-freemium';
        else if(tag.includes('Beta'))badgeClass='badge-beta';
        return`<span class="badge ${badgeClass}">${tag}</span>`;
    }).join(' ');
    const newBadge=tool.new?'<span class="badge badge-new">New</span>':'';
    return`
        <div class="tool-card">
            <div class="card-header">
                <div class="card-emoji"><i data-lucide="${icon}"></i></div>
                ${newBadge}
            </div>
            <h3 class="card-title">
                <a href="${tool.url}" target="_blank" rel="noopener">${tool.name}</a>
            </h3>
            <p class="card-description">${tool.description}</p>
            <div class="card-badges">${badges}</div>
            <a href="${tool.url}" target="_blank" rel="noopener" class="card-button">Visit Tool →</a>
        </div>
    `;
}

function updateToolCount(){
    document.getElementById('toolCount').textContent=tools.length;
}

function setupEventListeners(){
    document.getElementById('themeToggle').addEventListener('click',toggleTheme);
    document.getElementById('searchInput').addEventListener('input',e=>{
        currentSearch=e.target.value;
        renderByCategory();
    });
    document.querySelectorAll('.filter-btn').forEach(btn=>{
        btn.addEventListener('click',e=>{
            document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
            e.currentTarget.classList.add('active');
            currentFilter=e.currentTarget.dataset.category;
            renderByCategory();
        });
    });
    const backToTop=document.getElementById('backToTop');
    window.addEventListener('scroll',()=>{
        backToTop.classList.toggle('show',window.scrollY>300);
    });
    backToTop.addEventListener('click',()=>{
        window.scrollTo({top:0,behavior:'smooth'});
    });
}
