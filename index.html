<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWA Install Test</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#667eea">
    <style>
        body{font-family:sans-serif;max-width:600px;margin:50px auto;padding:20px;background:#0f172a;color:#e2e8f0;}
        h1{color:#667eea;}
        .status{background:#1e293b;padding:15px;border-radius:8px;margin:10px 0;}
        .success{color:#10b981;}
        .error{color:#ef4444;}
    </style>
</head>
<body>
    <h1>🧪 PWA Installation Test</h1>
    <p>This page will test if PWA can install on your site.</p>
    <div id="results"></div>
    
    <script>
    const results = document.getElementById('results');
    
    // Test 1: Service Worker Support
    if('serviceWorker' in navigator){
        results.innerHTML += '<div class="status success">✅ Service Worker supported</div>';
        
        // Register SW
        navigator.serviceWorker.register('./sw-minimal.js')
            .then(reg => {
                results.innerHTML += '<div class="status success">✅ SW registered: ' + reg.scope + '</div>';
            })
            .catch(err => {
                results.innerHTML += '<div class="status error">❌ SW failed: ' + err.message + '</div>';
            });
    } else {
        results.innerHTML += '<div class="status error">❌ Service Worker not supported</div>';
    }
    
    // Test 2: Manifest
    fetch('./manifest.json')
        .then(r => {
            if(r.ok) return r.json();
            throw new Error('Manifest not found');
        })
        .then(data => {
            results.innerHTML += '<div class="status success">✅ Manifest loaded: ' + data.name + '</div>';
        })
        .catch(err => {
            results.innerHTML += '<div class="status error">❌ Manifest error: ' + err.message + '</div>';
        });
    
    // Test 3: Install prompt
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        results.innerHTML += '<div class="status success">✅ Install prompt ready!</div>';
        
        // Show install button
        const btn = document.createElement('button');
        btn.textContent = '📲 Install App';
        btn.style = 'background:#667eea;color:white;border:none;padding:15px 30px;border-radius:8px;font-size:16px;cursor:pointer;margin-top:20px;';
        btn.onclick = () => {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choiceResult) => {
                if (choiceResult.outcome === 'accepted') {
                    results.innerHTML += '<div class="status success">✅ User accepted install!</div>';
                }
                deferredPrompt = null;
            });
        };
        document.body.appendChild(btn);
    });
    
    // Test 4: HTTPS check
    if(location.protocol === 'https:'){
        results.innerHTML += '<div class="status success">✅ HTTPS enabled</div>';
    } else {
        results.innerHTML += '<div class="status error">❌ HTTPS required for PWA</div>';
    }
    
    setTimeout(() => {
        if(!deferredPrompt){
            results.innerHTML += '<div class="status error">⚠️ Install prompt not triggered. Check DevTools console.</div>';
        }
    }, 3000);
    </script>
</body>
</html>
